<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestie Friends</title>
    <!-- Fuentes elegantes -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #fcdcdc;
            --text-color: #5D5D5D;
            --accent-color: #E6B8B8;
            --accent-hover: #D49A9A;
            --card-bg: #fff1f1;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- LOGIN --- */
        #login-container {
            text-align: center;
            padding: 40px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            width: 90%;
            max-width: 400px;
            transition: all 0.5s ease;
            z-index: 10;
        }

        h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; margin-bottom: 10px; color: var(--text-color); }
        p.subtitle { font-size: 0.9rem; margin-bottom: 30px; opacity: 0.7; }

        input {
            width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 50px;
            background: #fafafa; text-align: center; font-size: 1rem; outline: none;
            transition: 0.3s; margin-bottom: 20px;
        }
        input:focus { border-color: var(--accent-color); background: #fff; }

        button {
            background-color: var(--accent-color); color: white; border: none;
            padding: 15px 40px; border-radius: 50px; font-size: 1rem; cursor: pointer;
            transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;
        }
        button:hover { background-color: var(--accent-hover); transform: translateY(-2px); }
        .error-msg { color: #d68c8c; margin-top: 15px; font-size: 0.85rem; display: none; }

        /* --- GALERÍA --- */
        #gallery-container {
            display: none;
            width: 100%; height: 100%;
            overflow-y: auto;
            padding: 40px 20px;
            text-align: center;
        }

        .gallery-header { margin-bottom: 40px; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .photo-card {
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            /* MODIFICADO: Eliminado aspect-ratio fijo */
            position: relative;
            cursor: zoom-in;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 250px;
        }

        .photo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
        }

        /* MODIFICADO: Para mantener aspect ratio original */
        .photo-card img, .photo-card video {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
            max-height: 400px;
        }

        .photo-card::after {
            content: '⤢';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 2rem; color: white;
            opacity: 0.8;
            transition: 0.3s;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            pointer-events: none;
        }
        .photo-card:hover::after { transform: translate(-50%, -50%) scale(1); }

        .logout-btn {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(255,255,255,0.9); color: var(--text-color);
            padding: 10px 20px; border-radius: 30px; font-size: 0.8rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); z-index: 5;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: var(--accent-color);
            color: white;
            transform: translateY(-2px);
        }

        /* --- LIGHTBOX (VISOR EN GRANDE) --- */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #lightbox.active {
            display: flex;
            opacity: 1;
        }

        #lightbox-content {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 1rem;
            max-width: 90%;
            max-height: 85vh;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            animation: zoomIn 0.3s ease;
        }

        /* MODIFICADO: Para que el contenido del lightbox mantenga su aspect ratio */
        #lightbox-content img, #lightbox-content video {
            max-width: 100%;
            max-height: 85vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 8px;
        }

        .close-lightbox {
            position: absolute;
            top: 20px; right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            z-index: 1001;
        }
        .close-lightbox:hover { color: var(--accent-color); transform: rotate(90deg); }

        /* Indicador de carga */
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .fade-in { animation: fadeIn 1s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 12px;
            }
            .gallery-header h1 { font-size: 1.8rem; }
            
            .photo-card {
                min-height: 180px;
            }
            
            .photo-card img, .photo-card video {
                max-height: 280px;
            }
        }
    </style>
</head>
<body>

    <!-- PANTALLA DE BLOQUEO -->
    <div id="login-container" class="fade-in">
        <h1>For Us</h1>
        <p class="subtitle">Solo para nosotras 4</p>
        <input type="password" id="passwordInput" placeholder="Ingresa la clave secreta">
        <br>
        <button onclick="checkPassword()">Entrar</button>
        <p id="error-msg" class="error-msg">Ups, esa no es la clave ✨</p>
    </div>

    <!-- PANTALLA DE GALERÍA -->
    <div id="gallery-container">
        <div class="gallery-header fade-in">
            <h1>Nuestros Grandes Momentos</h1>
            <h1>Juntas</h1>
        </div>

        <div class="gallery-grid" id="gallery-grid">
            <div class="loading">Cargando galería... ✨</div>
        </div>

        <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" onclick="closeLightbox(event)">
        <span class="close-lightbox" onclick="closeLightbox(event)">&times;</span>
        <div id="lightbox-content"></div>
    </div>

    <script>
        const CLAVE_SECRETA = "amigas";
        
        // ============================================
        // 📦 OBJETO CON TODAS LAS IMÁGENES Y VIDEOS
        // ============================================
        const galeria = {
            // Imágenes: del 1 al 15 en carpeta "fotos/"
            imagenes: [
                { id: 1, archivo: "1.jpeg", tipo: "imagen", ruta: "fotos/1.jpeg" },
                { id: 2, archivo: "2.jpeg", tipo: "imagen", ruta: "fotos/2.jpeg" },
                { id: 3, archivo: "3.jpeg", tipo: "imagen", ruta: "fotos/3.jpeg" },
                { id: 4, archivo: "4.jpeg", tipo: "imagen", ruta: "fotos/4.jpeg" },
                { id: 5, archivo: "5.jpeg", tipo: "imagen", ruta: "fotos/5.jpeg" },
                { id: 6, archivo: "6.jpeg", tipo: "imagen", ruta: "fotos/6.jpeg" },
                { id: 7, archivo: "7.jpeg", tipo: "imagen", ruta: "fotos/7.jpeg" },
                { id: 8, archivo: "8.jpeg", tipo: "imagen", ruta: "fotos/8.jpeg" },
                { id: 9, archivo: "9.jpeg", tipo: "imagen", ruta: "fotos/9.jpeg" },
                { id: 10, archivo: "10.jpeg", tipo: "imagen", ruta: "fotos/10.jpeg" },
                { id: 11, archivo: "11.jpeg", tipo: "imagen", ruta: "fotos/11.jpeg" },
                { id: 12, archivo: "12.jpeg", tipo: "imagen", ruta: "fotos/12.jpeg" },
                { id: 13, archivo: "13.jpeg", tipo: "imagen", ruta: "fotos/13.jpeg" },
                { id: 14, archivo: "14.jpeg", tipo: "imagen", ruta: "fotos/14.jpeg" },
                { id: 15, archivo: "15.jpeg", tipo: "imagen", ruta: "fotos/15.jpeg" }
            ],
            // Videos: del 1 al 25 en carpeta "videos/"
            videos: [
                { id: 1, archivo: "1.mp4", tipo: "video", ruta: "videos/1.mp4" },
                { id: 2, archivo: "2.mp4", tipo: "video", ruta: "videos/2.mp4" },
                { id: 3, archivo: "3.mp4", tipo: "video", ruta: "videos/3.mp4" },
                { id: 4, archivo: "4.mp4", tipo: "video", ruta: "videos/4.mp4" },
                { id: 5, archivo: "5.mp4", tipo: "video", ruta: "videos/5.mp4" },
                { id: 6, archivo: "6.mp4", tipo: "video", ruta: "videos/6.mp4" },
                { id: 7, archivo: "7.mp4", tipo: "video", ruta: "videos/7.mp4" },
                { id: 8, archivo: "8.mp4", tipo: "video", ruta: "videos/8.mp4" },
                { id: 9, archivo: "9.mp4", tipo: "video", ruta: "videos/9.mp4" },
                { id: 10, archivo: "10.mp4", tipo: "video", ruta: "videos/10.mp4" },
                { id: 11, archivo: "11.mp4", tipo: "video", ruta: "videos/11.mp4" },
                { id: 12, archivo: "12.mp4", tipo: "video", ruta: "videos/12.mp4" },
                { id: 13, archivo: "13.mp4", tipo: "video", ruta: "videos/13.mp4" },
                { id: 14, archivo: "14.mp4", tipo: "video", ruta: "videos/14.mp4" },
                { id: 15, archivo: "15.mp4", tipo: "video", ruta: "videos/15.mp4" },
                { id: 16, archivo: "16.mp4", tipo: "video", ruta: "videos/16.mp4" },
                { id: 17, archivo: "17.mp4", tipo: "video", ruta: "videos/17.mp4" },
                { id: 18, archivo: "18.mp4", tipo: "video", ruta: "videos/18.mp4" },
                { id: 19, archivo: "19.mp4", tipo: "video", ruta: "videos/19.mp4" },
                { id: 20, archivo: "20.mp4", tipo: "video", ruta: "videos/20.mp4" },
                { id: 21, archivo: "21.mp4", tipo: "video", ruta: "videos/21.mp4" },
                { id: 22, archivo: "22.mp4", tipo: "video", ruta: "videos/22.mp4" },
                { id: 23, archivo: "23.mp4", tipo: "video", ruta: "videos/23.mp4" },
                { id: 24, archivo: "24.mp4", tipo: "video", ruta: "videos/24.mp4" },
                { id: 25, archivo: "25.mp4", tipo: "video", ruta: "videos/25.mp4" }
            ]
        };

        // Combinar imágenes y videos en un solo array (orden opcional)
        function obtenerTodoElContenido() {
            // Primero imágenes, luego videos (puedes cambiar el orden si quieres mezclarlos)
            return [...galeria.imagenes, ...galeria.videos];
        }

        // Función para generar la galería dinámicamente
        function cargarGaleria() {
            const grid = document.getElementById('gallery-grid');
            const todosLosItems = obtenerTodoElContenido();
            
            // Limpiar y mostrar loading
            grid.innerHTML = '';
            
            // Crear cada elemento de la galería
            todosLosItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.onclick = () => openLightbox(card);
                
                if (item.tipo === 'imagen') {
                    const img = document.createElement('img');
                    img.src = item.ruta;
                    img.alt = `Momento ${item.id}`;
                    img.loading = 'lazy'; // Carga diferida para mejor rendimiento
                    card.appendChild(img);
                } else if (item.tipo === 'video') {
                    const video = document.createElement('video');
                    video.src = item.ruta;
                    video.muted = true;
                    video.preload = 'metadata'; // Solo precarga metadatos
                    video.addEventListener('mouseenter', () => video.play());
                    video.addEventListener('mouseleave', () => {
                        video.pause();
                        video.currentTime = 0;
                    });
                    card.appendChild(video);
                }
                
                // Guardar la ruta y tipo en el card para usarlos en el lightbox
                card.dataset.ruta = item.ruta;
                card.dataset.tipo = item.tipo;
                
                grid.appendChild(card);
            });
        }

        // Verificar sesión al cargar
        if(sessionStorage.getItem("acceso") === "true") { 
            mostrarGaleria(); 
            cargarGaleria();
        }

        function checkPassword() {
            const input = document.getElementById("passwordInput").value.toLowerCase();
            if(input === CLAVE_SECRETA) {
                sessionStorage.setItem("acceso", "true");
                mostrarGaleria();
                cargarGaleria();
            } else {
                const errorMsg = document.getElementById("error-msg");
                errorMsg.style.display = "block";
                document.getElementById("passwordInput").style.borderColor = "#d68c8c";
            }
        }

        function mostrarGaleria() {
            document.getElementById("login-container").style.display = "none";
            document.body.style.overflow = "auto";
            document.getElementById("gallery-container").style.display = "block";
        }

        function logout() {
            sessionStorage.removeItem("acceso");
            location.reload();
        }

        document.getElementById("passwordInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") { checkPassword(); }
        });

        // --- FUNCIONES DEL LIGHTBOX ---
        
        function openLightbox(element) {
            const lightbox = document.getElementById('lightbox');
            const content = document.getElementById('lightbox-content');
            const tipo = element.dataset.tipo;
            const ruta = element.dataset.ruta;
            
            // Limpiar contenido anterior
            content.innerHTML = '';

            if (tipo === 'imagen') {
                const newImg = document.createElement('img');
                newImg.src = ruta;
                newImg.style.maxWidth = '90%';
                newImg.style.maxHeight = '85vh';
                newImg.style.width = 'auto';
                newImg.style.height = 'auto';
                newImg.style.objectFit = 'contain';
                newImg.style.borderRadius = '8px';
                content.appendChild(newImg);
            } else if (tipo === 'video') {
                const newVideo = document.createElement('video');
                newVideo.src = ruta;
                newVideo.controls = true;
                newVideo.style.maxWidth = '90%';
                newVideo.style.maxHeight = '85vh';
                newVideo.style.width = 'auto';
                newVideo.style.height = 'auto';
                newVideo.style.borderRadius = '8px';
                newVideo.autoplay = true;
                content.appendChild(newVideo);
            }

            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox(event) {
            if (event.target.id === 'lightbox' || event.target.classList.contains('close-lightbox')) {
                const lightbox = document.getElementById('lightbox');
                const content = document.getElementById('lightbox-content');
                
                const video = content.querySelector('video');
                if(video) video.pause();

                lightbox.classList.remove('active');
                document.body.style.overflow = 'auto';
                
                setTimeout(() => { content.innerHTML = ''; }, 300);
            }
        }
    </script>
</body>
</html>
